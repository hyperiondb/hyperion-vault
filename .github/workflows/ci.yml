name: ci

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: build + test (core, api, umbrella)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy -p hyperion-vault-core -p hyperion-vault-api -p hyperion-vault --all-targets -- -D warnings
      - run: cargo test -p hyperion-vault-core
      - run: cargo build -p hyperion-vault-api

  extension:
    name: extension (pgrx, pg18)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install PostgreSQL 18 dev headers
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-18 postgresql-server-dev-18
      - name: install cargo-pgrx
        run: cargo install --locked cargo-pgrx --version 0.18.1
      - name: pgrx init
        run: cargo pgrx init --pg18 "$(command -v pg_config)"
      - name: pgrx test
        working-directory: extension
        run: cargo pgrx test --no-default-features --features pg18
