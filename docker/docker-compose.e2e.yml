name: hyperion-vault

services:
  vault1:
    environment:
      VAULT_BOOTSTRAP_TOKEN: "${VAULT_BOOTSTRAP_TOKEN:-dev-admin-token-change-me}"

  vault2:
    environment:
      VAULT_BOOTSTRAP_TOKEN: "${VAULT_BOOTSTRAP_TOKEN:-dev-admin-token-change-me}"

  vault3:
    environment:
      VAULT_BOOTSTRAP_TOKEN: "${VAULT_BOOTSTRAP_TOKEN:-dev-admin-token-change-me}"

  runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.runner
    image: hyperion-vault-runner:e2e
    container_name: hv-runner
    environment:
      VAULT_ADMIN_TOKEN: "${VAULT_BOOTSTRAP_TOKEN:-dev-admin-token-change-me}"
    volumes:
      - ..:/work
    working_dir: /work
    networks: [vault]
    depends_on: [vault1, vault2, vault3]
