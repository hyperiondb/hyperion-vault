name: hyperion-vault

x-vault-env: &vault-env
  VAULT_PEERS: "1=vault1:7400,2=vault2:7400,3=vault3:7400"
  VAULT_API_PORT: "8200"
  VAULT_DB_PATH: "/data/vault.redb"
  VAULT_KMS_MODE: "local"
  VAULT_LOCAL_MASTER_KEY: "${VAULT_LOCAL_MASTER_KEY:?set VAULT_LOCAL_MASTER_KEY in docker/.env}"
  VAULT_ALLOWED_IPS: "${VAULT_ALLOWED_IPS:-0.0.0.0/0}"
  VAULT_TRUST_PROXY: "false"
  VAULT_READ_CONSISTENCY: "${VAULT_READ_CONSISTENCY:-local}"
  VAULT_DEK_CACHE_TTL_SECS: "${VAULT_DEK_CACHE_TTL_SECS:-300}"
  VAULT_ROTATION_POLL_SECS: "10"
  RUST_LOG: "${RUST_LOG:-info}"

services:
  vault1:
    image: hyperion-vault:local
    build:
      context: ..
      dockerfile: docker/Dockerfile
    init: true
    networks: [vault]
    restart: unless-stopped
    container_name: hv-vault1
    environment:
      <<: *vault-env
      NODE_ID: "1"
    volumes: [vault1data:/data]
    ports: ["8200:8200"]

  vault2:
    image: hyperion-vault:local
    init: true
    networks: [vault]
    restart: unless-stopped
    container_name: hv-vault2
    depends_on: [vault1]
    environment:
      <<: *vault-env
      NODE_ID: "2"
    volumes: [vault2data:/data]
    ports: ["8201:8200"]

  vault3:
    image: hyperion-vault:local
    init: true
    networks: [vault]
    restart: unless-stopped
    container_name: hv-vault3
    depends_on: [vault1]
    environment:
      <<: *vault-env
      NODE_ID: "3"
    volumes: [vault3data:/data]
    ports: ["8202:8200"]

networks:
  vault:

volumes:
  vault1data:
  vault2data:
  vault3data:
